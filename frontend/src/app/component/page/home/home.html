<app-search-component></app-search-component>
<app-tags></app-tags>
<app-notfound [visible]="!foods().length"
resetLinkText="Reset Search"
resetLinkRoute="/"></app-notfound>
<ul>
<li *ngFor="let food of foods()">
<a routerLink="/food/{{food.id}}">
<img [src]="food.imageUrl" [alt]="food.name"/>
<div class="content">
<div class="name">{{food.name}}</div>
<span class="favorite {{food.favorite? ' ' : 'not'}}">❤</span>

<div class="starts">

</div>
<div class="product-item-footer">
<div class="origins">
<span *ngFor="let origin of food.origins">
    {{origin}}
</span>


</div>

<div class="cook-time">

<span>🕖</span>
    {{food.cookTime}}
</div>



</div>


<div class="price">

    <span>{{food.price }} </span>
</div>

</div>
</a>

</li>


</ul>
